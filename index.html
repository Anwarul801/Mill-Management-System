<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মেস হিসাব</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Hind+Siliguri:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

* { box-sizing: border-box; }

#mh-root {
  --paper: #F7F1E2;
  --paper-dark: #EFE5C9;
  --card: #FFFDF7;
  --card-highlight: #FFFFFF;
  --ink: #2B2620;
  --ink-soft: #7A6F5C;
  --rule: #CBBFA0;
  --green: #2F6F4E;
  --green-soft: #E3EEE6;
  --rust: #B5482F;
  --rust-soft: #F6E4DD;
  --gold: #D9A441;
  --gold-dark: #B9852A;
  --navy: #2B3A55;
  --cover: #2B2620;
  font-family: 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100%;
  padding: 0;
  font-size: 15px;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s ease, color 0.2s ease;
}

#mh-root.mh-dark {
  --paper: #1E1B16;
  --paper-dark: #262119;
  --card: #2A251E;
  --card-highlight: #342E24;
  --ink: #ECE4D2;
  --ink-soft: #A79A82;
  --rule: #453E30;
  --green: #55B685;
  --green-soft: #203327;
  --rust: #E4886A;
  --rust-soft: #3A2620;
  --gold: #ECBE68;
  --gold-dark: #C99A3E;
  --navy: #8FA8D0;
  --cover: #131110;
}

#mh-root .mh-serif { font-family: 'Tiro Bangla', 'Noto Serif Bengali', serif; }
#mh-root .mh-mono { font-family: 'JetBrains Mono', monospace; }

#mh-root .mh-shell { max-width: 720px; margin: 0 auto; padding: 16px 14px 60px; }

/* ---------- HEADER ---------- */
#mh-root .mh-header {
  background: var(--cover);
  background-image: linear-gradient(135deg, #2B2620 0%, #3A3226 100%);
  border-radius: 14px;
  padding: 18px 18px 16px;
  color: var(--paper);
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
}
#mh-root .mh-header::after {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(90deg, rgba(217,164,65,0.06) 0 1px, transparent 1px 22px);
  pointer-events: none;
}
#mh-root .mh-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
#mh-root .mh-title { font-family: 'Tiro Bangla', serif; font-size: 22px; letter-spacing: 0.3px; color: var(--gold); }
#mh-root .mh-subtitle { font-size: 12px; color: #D8CFB8; margin-top: 2px; }
#mh-root .mh-lock-btn {
  background: rgba(217,164,65,0.15);
  border: 1px solid rgba(217,164,65,0.5);
  color: var(--gold);
  border-radius: 999px;
  padding: 7px 13px;
  font-size: 12.5px;
  font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
}
#mh-root .mh-lock-btn.on { background: var(--green); border-color: var(--green); color: #fff; }

#mh-root .mh-manager-badge {
  margin-top: 10px; font-size: 12px; color: #EADFC0; background: rgba(217,164,65,0.12);
  border: 1px solid rgba(217,164,65,0.35); border-radius: 8px; padding: 6px 10px; display:inline-block;
}
#mh-root .mh-manager-badge b { color: var(--gold); font-weight:700; }

#mh-root .mh-month-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; background: rgba(255,255,255,0.06);
  border-radius: 10px; padding: 6px 6px;
}
#mh-root .mh-month-btn {
  background: transparent; border: none; color: var(--paper);
  font-size: 18px; padding: 4px 12px; cursor: pointer; border-radius: 8px;
}
#mh-root .mh-month-btn:active { background: rgba(255,255,255,0.1); }
#mh-root .mh-month-label { font-family: 'Tiro Bangla', serif; font-size: 15.5px; color: #fff; }

#mh-root .mh-sync-row { display:flex; align-items:center; gap:6px; font-size:11px; color:#B8AE95; margin-top:8px; }
#mh-root .mh-sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 0 0 rgba(47,111,78,0.6); animation: mh-pulse 2s infinite; }
@keyframes mh-pulse { 0%{box-shadow:0 0 0 0 rgba(47,111,78,0.5);} 70%{box-shadow:0 0 0 6px rgba(47,111,78,0);} 100%{box-shadow:0 0 0 0 rgba(47,111,78,0);} }

/* ---------- TABS ---------- */
#mh-root .mh-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px;
  scrollbar-width: none;
}
#mh-root .mh-tabs::-webkit-scrollbar { display: none; }
#mh-root .mh-tab {
  flex: 0 0 auto; padding: 8px 14px; border-radius: 999px; border: 1px solid var(--rule);
  background: var(--card); color: var(--ink-soft); font-size: 13px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
#mh-root .mh-tab.active { background: var(--cover); color: var(--gold); border-color: var(--cover); }

/* ---------- CARDS / SECTIONS ---------- */
#mh-root .mh-section-title {
  font-family: 'Tiro Bangla', serif; font-size: 17px; margin: 4px 0 10px; display:flex; align-items:center; gap:8px;
}
#mh-root .mh-section-title .mh-eyebrow {
  font-family: 'Hind Siliguri', sans-serif; font-size: 10.5px; letter-spacing: 0.5px; color: var(--gold-dark);
  background: #F1DFB4; padding: 2px 8px; border-radius: 5px; font-weight:700;
}
#mh-root .mh-card {
  background: var(--card); border: 1px solid var(--rule); border-radius: 12px; padding: 14px;
  margin-bottom: 14px;
}

/* summary stat strip */
#mh-root .mh-stat-strip { display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-bottom:16px; }
#mh-root .mh-stat { background: var(--card); border:1px solid var(--rule); border-radius:10px; padding:10px 8px; text-align:center; }
#mh-root .mh-stat .mh-stat-num { font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:var(--navy); }
#mh-root .mh-stat .mh-stat-label { font-size:10px; color:var(--ink-soft); margin-top:2px; }

/* remaining-fund hero */
#mh-root .mh-fund-card { border:1.5px solid var(--rule); border-radius:14px; padding:16px; text-align:center; margin-bottom:14px; }
#mh-root .mh-fund-label { font-size:12px; color:var(--ink-soft); font-weight:600; margin-bottom:4px; }
#mh-root .mh-fund-amount { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700; }
#mh-root .mh-fund-sub { font-size:10.5px; color:var(--ink-soft); margin-top:4px; }

/* hanging tag cards (signature element) */
#mh-root .mh-rack { margin: 30px 4px 0; position: relative; }
#mh-root .mh-rail {
  height: 5px; border-radius: 4px; position: relative;
  background: linear-gradient(90deg, var(--ink-soft), var(--rule) 8%, var(--rule) 92%, var(--ink-soft));
  box-shadow: 0 2px 3px rgba(43,38,32,0.15);
}
#mh-root .mh-rail::before, #mh-root .mh-rail::after {
  content:''; position:absolute; top:-4px; width:13px; height:13px; border-radius:50%;
  background: var(--ink-soft); box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
}
#mh-root .mh-rail::before { left:-2px; }
#mh-root .mh-rail::after { right:-2px; }
#mh-root .mh-tag-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap: 24px 12px; padding-top: 24px; }
#mh-root .mh-tag {
  position: relative; background: var(--card);
  background-image: linear-gradient(165deg, var(--card-highlight) 0%, var(--card) 55%);
  border: 1px solid var(--rule);
  border-radius: 5px 5px 12px 12px;
  padding: 16px 12px 12px; text-align:center;
  box-shadow: 0 3px 0 rgba(203,191,160,0.35), 0 8px 16px -8px rgba(43,38,32,0.35);
}
#mh-root .mh-tag::before {
  content:''; position:absolute; top:-24px; left:50%; width:2px; height:24px; background: var(--ink-soft); opacity:0.55; transform:translateX(-50%);
}
#mh-root .mh-tag::after {
  content:''; position:absolute; top:-29px; left:50%; width:10px; height:10px; border-radius:50%;
  background: var(--paper); border: 2px solid var(--ink-soft); transform:translateX(-50%);
  box-shadow: 0 1px 2px rgba(43,38,32,0.25);
}
#mh-root .mh-tag-avatar-row { display:flex; align-items:center; gap:9px; margin-bottom:12px; }
#mh-root .mh-tag-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex: 0 0 auto;
  display:flex; align-items:center; justify-content:center;
  font-family:'Tiro Bangla',serif; font-size:15px; font-weight:700; color:#fff;
  box-shadow: inset 0 -2px 3px rgba(0,0,0,0.15), 0 2px 4px rgba(43,38,32,0.2);
}
#mh-root .mh-tag-name { font-weight:700; font-size:13.5px; text-align:left; line-height:1.2; }
#mh-root .mh-tag-name .mh-tag-archived-badge { display:block; font-size:9.5px; font-weight:600; color: var(--ink-soft); margin-top:1px; }
#mh-root .mh-tag-balance { font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:5px; }
#mh-root .mh-tag-balance .mh-arrow { font-size:14px; }
#mh-root .mh-tag-status { font-size:10.5px; margin-top:3px; font-weight:600; letter-spacing:0.2px; }
#mh-root .mh-tag-meta { font-size:10.5px; color: var(--ink-soft); margin-top:10px; display:flex; justify-content:space-between; border-top:1px dashed var(--rule); padding-top:7px; }

/* tables */
#mh-root .mh-table-wrap { overflow-x: auto; border: 1px solid var(--rule); border-radius: 10px; }
#mh-root table.mh-table { border-collapse: collapse; width: 100%; min-width: 480px; font-size: 13px; }
#mh-root table.mh-table th, #mh-root table.mh-table td {
  border-bottom: 1px solid var(--rule); border-right: 1px solid var(--rule);
  padding: 7px 6px; text-align: center; white-space: nowrap;
}
#mh-root table.mh-table th:last-child, #mh-root table.mh-table td:last-child { border-right: none; }
#mh-root table.mh-table thead th {
  background: var(--paper-dark); font-family:'Tiro Bangla',serif; font-weight:400; font-size:13px; position: sticky; top:0;
}
#mh-root table.mh-table td.mh-date-cell { text-align:left; color: var(--ink-soft); font-family:'JetBrains Mono',monospace; font-size:12px; background: var(--paper); }
#mh-root table.mh-table tr.mh-today td { background: #FBF0D6; }
#mh-root table.mh-table tfoot td { background: var(--paper-dark); font-weight:700; font-family:'JetBrains Mono',monospace; }
#mh-root .mh-meal-input {
  width: 40px; text-align:center; border:1px solid var(--rule); border-radius:6px; padding:4px 2px;
  font-family:'JetBrains Mono',monospace; font-size:13px; background:#fff; color:#111;
}
#mh-root .mh-meal-input:disabled { background: transparent; border-color:transparent; color: var(--ink); }

/* forms */
#mh-root .mh-form-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
#mh-root .mh-field { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
#mh-root .mh-field label { font-size:11.5px; color: var(--ink-soft); font-weight:600; }
#mh-root .mh-field input, #mh-root .mh-field select, #mh-root .mh-field textarea {
  border:1px solid var(--rule); border-radius:8px; padding:9px 10px; font-size:14px; background:#fff; color:#161310;
  font-family:'Hind Siliguri',sans-serif;
}
#mh-root .mh-btn {
  border:none; border-radius:9px; padding:10px 16px; font-weight:700; font-size:13.5px; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px; justify-content:center;
}
#mh-root .mh-btn-primary { background: var(--green); color:#fff; }
#mh-root .mh-btn-primary:active { background:#255c40; }
#mh-root .mh-btn-ghost { background: transparent; color: var(--ink-soft); border:1px solid var(--rule); }
#mh-root .mh-btn-danger { background: var(--rust-soft); color: var(--rust); }
#mh-root .mh-btn-block { width:100%; }
#mh-root .mh-btn-sm { padding:6px 10px; font-size:12px; }

#mh-root .mh-list-row {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:10px 4px; border-bottom:1px solid var(--rule);
}
#mh-root .mh-list-row:last-child { border-bottom:none; }
#mh-root .mh-list-main { font-size:13.5px; font-weight:600; }
#mh-root .mh-list-sub { font-size:11.5px; color:var(--ink-soft); margin-top:1px; }
#mh-root .mh-list-amt { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; }
#mh-root .mh-chip { font-size:10.5px; background: var(--green-soft); color:var(--green); padding:2px 8px; border-radius:999px; font-weight:700; }
#mh-root .mh-icon-btn { background:none; border:none; color: var(--ink-soft); font-size:16px; cursor:pointer; padding:4px 6px; }

#mh-root .mh-empty { text-align:center; padding:30px 10px; color: var(--ink-soft); font-size:13px; }
#mh-root .mh-empty .mh-serif { font-size:15px; color:var(--ink); display:block; margin-bottom:4px; }

/* modal */
#mh-root .mh-overlay {
  position: fixed; inset:0; background: rgba(20,17,14,0.6); display:flex; align-items:center; justify-content:center;
  z-index: 1000; padding: 20px;
}
#mh-root .mh-modal {
  background: var(--card); border-radius: 14px; padding: 20px; max-width: 340px; width:100%;
  border: 1px solid var(--rule); max-height: 88vh; overflow-y: auto;
}
#mh-root .mh-modal h3 { font-family:'Tiro Bangla',serif; font-size:17px; margin:0 0 4px; }
#mh-root .mh-modal p { font-size:12.5px; color:var(--ink-soft); margin:0 0 14px; }
#mh-root .mh-toast {
  position: fixed; bottom: 18px; left:50%; transform:translateX(-50%);
  background: var(--cover); color: var(--gold); padding:10px 18px; border-radius:999px; font-size:12.5px;
  font-weight:600; z-index:1100; box-shadow: 0 6px 18px rgba(0,0,0,0.25); max-width:88vw; text-align:center;
}
#mh-root .mh-note-banner {
  background: #F1DFB4; color: #6B4E1B; border-radius: 10px; padding: 9px 12px;
  font-size: 12px; margin-bottom: 14px; display:flex; gap:8px; align-items:flex-start;
}

/* onboarding */
#mh-root .mh-onboard-hero {
  text-align:center; padding: 30px 16px 22px; margin-bottom: 6px;
  background: var(--cover); background-image: radial-gradient(circle at 50% 0%, #3A3226 0%, #2B2620 70%);
  border-radius: 16px; color: var(--paper);
}
#mh-root .mh-onboard-icon { font-size: 34px; margin-bottom: 8px; }
#mh-root .mh-onboard-title { font-family:'Tiro Bangla',serif; font-size: 20px; color: var(--gold); margin-bottom: 6px; }
#mh-root .mh-onboard-sub { font-size: 12.5px; color: #D8CFB8; max-width: 320px; margin: 0 auto; line-height:1.6; }
#mh-root .mh-chip-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
#mh-root .mh-chip-item {
  display:inline-flex; align-items:center; gap:6px; background: var(--green-soft); color: var(--green);
  border-radius: 999px; padding: 6px 6px 6px 12px; font-size:12.5px; font-weight:600;
}
#mh-root .mh-chip-item button {
  background: rgba(47,111,78,0.15); border:none; color: var(--green); width:18px; height:18px; border-radius:50%;
  font-size:13px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

/* settings: theme / language segmented toggles */
#mh-root .mh-seg { display:flex; gap:8px; }
#mh-root .mh-seg button {
  flex:1; padding:10px; border-radius:9px; border:1px solid var(--rule); background:var(--card);
  color:var(--ink-soft); font-weight:700; font-size:13px; cursor:pointer;
}
#mh-root .mh-seg button.active { background: var(--cover); color: var(--gold); border-color: var(--cover); }
#mh-root .mh-history-row { display:flex; justify-content:space-between; font-size:12px; padding:7px 0; border-bottom:1px dashed var(--rule); }
#mh-root .mh-history-row:last-child { border-bottom:none; }
#mh-root .mh-history-row .mh-h-name { font-weight:700; }
#mh-root .mh-history-row .mh-h-date { color: var(--ink-soft); }

/* print report (hidden on screen, shown only when printing) */
#mh-root .mh-print-only { display:none; }
.mh-print-report { font-family:'Hind Siliguri',sans-serif; color:#111; background:#fff; padding:12px; }
.mh-print-report h1 { font-family:'Tiro Bangla',serif; font-size:20px; margin:0 0 4px; }
.mh-print-report .mh-print-meta { font-size:12px; color:#333; margin-bottom:16px; line-height:1.6; }
.mh-print-report table { width:100%; border-collapse:collapse; margin-bottom:18px; font-size:12px; }
.mh-print-report th, .mh-print-report td { border:1px solid #999; padding:5px 7px; text-align:left; }
.mh-print-report th { background:#eee; }
.mh-print-report .mh-print-section-title { font-family:'Tiro Bangla',serif; font-size:14px; margin:16px 0 6px; }
@media print {
  body * { visibility: hidden !important; }
  #mh-print-report, #mh-print-report * { visibility: visible !important; }
  #mh-print-report { position:absolute; left:0; top:0; width:100%; display:block !important; }
}

@media (max-width: 380px) {
  #mh-root .mh-stat-strip { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>

  <div class="mh-shell" id="mh-shell">
    <div style="text-align:center;padding:60px 10px;color:#7A6F5C;">খাতা খোলা হচ্ছে...</div>
  </div>

<script>
/* ---------------- LOCAL STORAGE POLYFILL ----------------
   এই অ্যাপটি মূলত Claude.ai-এর window.storage API এর জন্য বানানো হয়েছিল,
   যা শুধু Claude-এর নিজস্ব পরিবেশে কাজ করে। সাধারণ ব্রাউজারে স্বাধীনভাবে
   চালানোর জন্য নিচে ব্রাউজারের localStorage দিয়ে সেই একই API তৈরি করা হলো,
   যাতে ডেটা সেভ/লোড, পিন সেটআপ, এডমিন লগইন সব ঠিকভাবে কাজ করে।
---------------------------------------------------------- */
if(!window.storage){
  window.storage = (function(){
    function fullKey(key, shared){ return 'messhishab-store:' + (shared ? 'shared' : 'local') + ':' + key; }
    return {
      get: function(key, shared){
        return new Promise(function(resolve){
          try {
            var raw = localStorage.getItem(fullKey(key, shared));
            if(raw === null || raw === undefined){ resolve(null); return; }
            resolve({ key: key, value: raw, shared: !!shared });
          } catch(e){ resolve(null); }
        });
      },
      set: function(key, value, shared){
        return new Promise(function(resolve){
          try {
            localStorage.setItem(fullKey(key, shared), value);
            resolve({ key: key, value: value, shared: !!shared });
          } catch(e){ resolve(null); }
        });
      },
      "delete": function(key, shared){
        return new Promise(function(resolve){
          try {
            localStorage.removeItem(fullKey(key, shared));
            resolve({ key: key, deleted: true, shared: !!shared });
          } catch(e){ resolve(null); }
        });
      },
      list: function(prefix, shared){
        return new Promise(function(resolve){
          try {
            var basePre = 'messhishab-store:' + (shared ? 'shared' : 'local') + ':';
            var pre = basePre + (prefix || '');
            var keys = [];
            for(var i=0;i<localStorage.length;i++){
              var k = localStorage.key(i);
              if(k && k.indexOf(pre) === 0){ keys.push(k.slice(basePre.length)); }
            }
            resolve({ keys: keys, prefix: prefix, shared: !!shared });
          } catch(e){ resolve(null); }
        });
      }
    };
  })();
}
(function(){

/* ================= I18N ================= */
var T = {
  bn: {
    app: { defaultName: 'মেস হিসাব খাতা', subtitle: 'সবার খাবার ও খরচের হিসাব, একসাথে' },
    lock: { on: '🔓 অ্যাডমিন', view: '🔒 ভিউ মোড' },
    manager: { label: 'এই মাসের ম্যানেজার', none: 'ম্যানেজার নির্ধারিত হয়নি' },
    tabs: { dashboard:'খাতা সারাংশ', meals:'মিল এন্ট্রি', bazar:'বাজার', expenses:'অন্যান্য খরচ', deposits:'জমা', members:'সদস্য', settings:'সেটিংস' },
    sync: { loading:'সিঙ্ক হচ্ছে...', justNow:'এইমাত্র আপডেট হয়েছে', agoSuffix:' সেকেন্ড আগে সিঙ্ক হয়েছে' },

function t(path){
  var parts = path.split('.');
  var obj = T[S.lang] || T.bn, i;
  for(i=0;i<parts.length;i++){ obj = obj && obj[parts[i]]; }
  if(obj === undefined || obj === null){

  }
  return (obj === undefined || obj === null) ? path : obj;
}

function currentYm(){ var d = new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }

function daysInMonth(ym){ var p = ym.split('-'); var y = parseInt(p[0],10), m = parseInt(p[1],10); return new Date(y, m, 0).getDate(); }
function fmtNum(n){ if(n===null||n===undefined||isNaN(n)) n=0; return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtInt(n){ if(n===null||n===undefined||isNaN(n)) n=0; var r = Math.round(n*100)/100; return (r % 1 === 0) ? String(r) : r.toFixed(2); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

function defaultData(){
  return { messName: '', managerId: '', managerHistory: [], members: [], meals: {}, bazar: [], expenses: [], deposits: [] };
}

function findMemberById(id){
  if(!id) return null;
  var f = S.data.members.filter(function(m){ return m.id === id; });
  return f[0] || null;
}
function activeMembers(){ return S.data.members.filter(function(m){ return m.active !== false; }); }
function archivedMembers(){ return S.data.members.filter(function(m){ return m.active === false; }); }

/* members relevant to a given month: everyone currently active,
   plus anyone archived who still has meal/deposit records that month
   (so past data always stays visible even after someone leaves) */
function membersForMonth(ym){
  var byId = {};
  activeMembers().forEach(function(m){ byId[m.id] = m; });
  Object.keys(S.data.meals).forEach(function(date){
    if(date.indexOf(ym) !== 0) return;
    Object.keys(S.data.meals[date]).forEach(function(mid){
      if(byId[mid]) return;
      var mem = findMemberById(mid);
      if(mem) byId[mid] = mem;
    });
  });
  S.data.deposits.forEach(function(d){
    if(d.date.indexOf(ym) !== 0) return;
    if(byId[d.memberId]) return;
    var mem = findMemberById(d.memberId);
    if(mem) byId[d.memberId] = mem;
  });
  var order = {};
  S.data.members.forEach(function(m,i){ order[m.id] = i; });
  return Object.keys(byId).map(function(id){ return byId[id]; })
    .sort(function(a,b){ return order[a.id] - order[b.id]; });
}

function isSetupComplete(){
  return !!(S.data && S.data.messName && S.data.messName.trim() && S.data.members && S.data.members.length > 0);
}

/* ---------------- STORAGE ---------------- */
function normalizeData(){
  if(!S.data) S.data = defaultData();
  if(typeof S.data.messName !== 'string') S.data.messName = '';
  if(typeof S.data.managerId !== 'string') S.data.managerId = '';
  if(!Array.isArray(S.data.managerHistory)) S.data.managerHistory = [];
  if(!Array.isArray(S.data.members)) S.data.members = [];
  if(!S.data.meals || typeof S.data.meals !== 'object') S.data.meals = {};
  if(!Array.isArray(S.data.bazar)) S.data.bazar = [];
  if(!Array.isArray(S.data.expenses)) S.data.expenses = [];
  if(!Array.isArray(S.data.deposits)) S.data.deposits = [];
}

async function loadAll(){
  try {
    var res = await window.storage.get(DATA_KEY, true);
    S.data = res && res.value ? JSON.parse(res.value) : defaultData();
  } catch(e){
    S.data = defaultData();
    try { await window.storage.set(DATA_KEY, JSON.stringify(S.data), true); } catch(e2){}
  }
  normalizeData();
  var sharedPin = null;
  try {
    var pinRes = await window.storage.get(PIN_KEY, true);
    sharedPin = pinRes && pinRes.value ? pinRes.value : null;
    S.pinExists = !!sharedPin;
  } catch(e){ S.pinExists = false; }
  try {
    var localRes = await window.storage.get(LOCAL_ADMIN_KEY, false);
    var localPin = localRes && localRes.value ? localRes.value : null;
    S.isAdmin = !!(localPin && sharedPin && localPin === sharedPin);
  } catch(e){ S.isAdmin = false; }
  try {
    var langRes = await window.storage.get(LANG_KEY, false);
    if(langRes && (langRes.value === 'bn' || langRes.value === 'en')) S.lang = langRes.value;
  } catch(e){}
  try {
    var themeRes = await window.storage.get(THEME_KEY, false);
    if(themeRes && (themeRes.value === 'light' || themeRes.value === 'dark')) S.theme = themeRes.value;
  } catch(e){}
  S.loaded = true;
  S.lastSync = new Date();
}

/* re-checks that this device's saved pin still matches the live admin pin
   (handles monthly manager handover: old device auto-drops to view mode) */
async function revalidateAdmin(){
  try {
    var pinRes = await window.storage.get(PIN_KEY, true);
    var sharedPin = pinRes && pinRes.value ? pinRes.value : null;
    var localRes = await window.storage.get(LOCAL_ADMIN_KEY, false);
    var localPin = localRes && localRes.value ? localRes.value : null;
    S.pinExists = !!sharedPin;
    var stillAdmin = !!(localPin && sharedPin && localPin === sharedPin);
    if(S.isAdmin && !stillAdmin){
      S.isAdmin = false;
      showToast(t('admin.changedElsewhere'));
      render();
    } else if(!S.isAdmin && stillAdmin){
      S.isAdmin = true;
      render();
    }
  } catch(e){}
}

async function saveData(){
  try {
    await window.storage.set(DATA_KEY, JSON.stringify(S.data), true);
    S.lastSync = new Date();
    return true;
  } catch(e){
    showToast(t('toast.saveFailed'));
    return false;
  }
}

async function pollForUpdates(){
  if(!S.loaded) return;
  var active = document.activeElement;
  if(active && active.tagName === 'INPUT' && active.classList.contains('mh-live-guard')) return;
  try {
    var res = await window.storage.get(DATA_KEY, true);
    var fresh = res && res.value ? res.value : null;
    if(fresh && fresh !== JSON.stringify(S.data)){
      S.data = JSON.parse(fresh);
      normalizeData();
      S.lastSync = new Date();
      render();
    } else {
      updateSyncLabel();
    }
  } catch(e){}
  if(!document.getElementById('mh-overlay')) revalidateAdmin();
}

/* ---------------- CALC ---------------- */
function calcMonth(ym){
  var members = membersForMonth(ym);
  var perMember = {};
  members.forEach(function(m){ perMember[m.id] = { meals: 0, deposit: 0 }; });

  Object.keys(S.data.meals).forEach(function(date){
    if(date.indexOf(ym) !== 0) return;
    var row = S.data.meals[date];
    Object.keys(row).forEach(function(mid){
      if(!perMember[mid]) return;
      perMember[mid].meals += (parseFloat(row[mid]) || 0);
    });
  });

  var totalCost = 0;
  S.data.bazar.forEach(function(b){ if(b.date.indexOf(ym) === 0) totalCost += (parseFloat(b.amount) || 0); });

  S.data.deposits.forEach(function(d){
    if(d.date.indexOf(ym) !== 0) return;
    if(!perMember[d.memberId]) return;
    perMember[d.memberId].deposit += (parseFloat(d.amount) || 0);
  });

  var totalMeals = 0;
  members.forEach(function(m){ totalMeals += perMember[m.id].meals; });
  var rate = totalMeals > 0 ? totalCost / totalMeals : 0;

  var totalOther = 0;
  S.data.expenses.forEach(function(x){ if(x.date.indexOf(ym) === 0) totalOther += (parseFloat(x.amount) || 0); });
  var activeIds = {};
  activeMembers().forEach(function(m){ activeIds[m.id] = true; });
  var activeCount = activeMembers().length;
  var otherShare = activeCount > 0 ? totalOther / activeCount : 0;

  members.forEach(function(m){
    var pm = perMember[m.id];
    pm.mealCost = pm.meals * rate;
    pm.otherShare = activeIds[m.id] ? otherShare : 0;
    pm.cost = pm.mealCost + pm.otherShare;
    pm.balance = pm.deposit - pm.cost;
  });

  var totalDeposit = 0;
  members.forEach(function(m){ totalDeposit += perMember[m.id].deposit; });

  var totalRemaining = totalDeposit - (totalCost + totalOther);

  return {
    members: members, perMember: perMember, totalMeals: totalMeals, totalCost: totalCost, rate: rate,
    totalOther: totalOther, otherShare: otherShare, activeCount: activeCount,
    totalDeposit: totalDeposit, totalRemaining: totalRemaining
  };
}

/* ---------------- MEALS ---------------- */
function renderMeals(){
  var members = membersForMonth(S.ym);
  var days = daysInMonth(S.ym);
  var today = todayStr();
  var weekdays = S.lang === 'en' ? EN_WEEKDAYS : BN_WEEKDAYS;
  var html = '';
  html += '<div class="mh-section-title"><span>' + t('meals.title') + '</span><span class="mh-eyebrow">' + ymLabel(S.ym) + '</span></div>';
  if(!S.isAdmin){
    html += '<div class="mh-note-banner">' + t('meals.viewBanner') + '</div>';
  }
  html += '<div class="mh-table-wrap"><table class="mh-table"><thead><tr><th style="text-align:left;">' + t('meals.date') + '</th>';
  members.forEach(function(m){ html += '<th>' + escapeHtml(m.name) + (m.active === false ? ' *' : '') + '</th>'; });
  html += '<th>' + t('meals.total') + '</th></tr></thead><tbody>';

  var colTotals = {};
  members.forEach(function(m){ colTotals[m.id] = 0; });
  var grandTotal = 0;

  for(var d=1; d<=days; d++){
    var date = S.ym + '-' + pad2(d);
    var dow = new Date(S.ym.split('-')[0], parseInt(S.ym.split('-')[1],10)-1, d).getDay();
    var row = S.data.meals[date] || {};
    var rowTotal = 0;
    html += '<tr class="' + (date===today?'mh-today':'') + '">';
    html += '<td class="mh-date-cell">' + d + ' ' + weekdays[dow] + '</td>';
    members.forEach(function(m){
      var val = row[m.id] !== undefined ? row[m.id] : '';
      rowTotal += (parseFloat(val) || 0);
      colTotals[m.id] += (parseFloat(val) || 0);
      if(S.isAdmin && m.active !== false){
        html += '<td><input class="mh-meal-input" type="number" min="0" step="0.5" value="' + (val===''?'':val) + '" placeholder="0" data-date="' + date + '" data-member="' + m.id + '" onchange="MH.updateMeal(this)"></td>';
      } else {
        html += '<td>' + (val === '' ? '&mdash;' : fmtInt(val)) + '</td>';
      }
    });
    grandTotal += rowTotal;
    html += '<td class="mh-mono" style="font-family:JetBrains Mono,monospace;">' + fmtInt(rowTotal) + '</td>';
    html += '</tr>';
  }

  if(members.some(function(m){ return m.active === false; })){
    html += '</tbody><tfoot><tr><td colspan="' + (members.length+2) + '" style="text-align:left;font-weight:400;font-size:11px;color:var(--ink-soft);background:var(--paper);">' + t('meals.archivedNote') + '</td></tr>';
  } else {
    html += '</tbody><tfoot>';
  }
  html += '<tr><td style="text-align:left;">' + t('meals.totalMeals') + '</td>';
  members.forEach(function(m){ html += '<td>' + fmtInt(colTotals[m.id]) + '</td>'; });
  html += '<td>' + fmtInt(grandTotal) + '</td></tr></tfoot>';
  html += '</table></div>';
  return html;
}

  var managerSelect = document.getElementById('mh-ob-manager-select');
  if(!managerSelect){ showToast(t('onboard.needManager')); return; }
  var managerIndex = parseInt(managerSelect.value, 10);

  var pinVal = null;
  if(!S.pinExists){
    var pinInput = document.getElementById('mh-ob-pin');
    pinVal = pinInput ? pinInput.value.trim() : '';
    if(pinVal.length < 4){ showToast(t('onboard.pinTooShort')); return; }
  }

  S.data.messName = name;
  var newMembers = S.onboardMembers.map(function(n, i){
    return { id: uid(), name: n, color: MEMBER_COLORS[i % MEMBER_COLORS.length], active: true };
  });
  S.data.members = newMembers;
  var manager = newMembers[managerIndex] || newMembers[0];
  S.data.managerId = manager.id;
  S.data.managerHistory.push({ name: manager.name, date: todayStr() });

  var ok = await saveData();
  if(!ok) return;

  if(pinVal){
    try {
      await window.storage.set(PIN_KEY, pinVal, true);
      await window.storage.set(LOCAL_ADMIN_KEY, pinVal, false);
      S.pinExists = true; S.isAdmin = true;
    } catch(e){ showToast(t('admin.problemToast')); }
  }

  S.onboardMembers = []; S.onboardName = '';
  render();
  showToast(name + t('onboard.doneToastSuffix'));
}

/* ---------------- ADMIN MODAL ---------------- */
function ensureOverlay(){
  var overlay = document.getElementById('mh-overlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.className = 'mh-overlay';
    overlay.id = 'mh-overlay';
    overlay.addEventListener('click', function(e){ if(e.target === overlay) closeModal(); });
    document.getElementById('mh-root').appendChild(overlay);
  }
  return overlay;
}

function openAdminModal(){
  var overlay = ensureOverlay();
  var html = '';
  if(S.isAdmin){
    html += '<div class="mh-modal"><h3>' + t('admin.onTitle') + '</h3><p>' + t('admin.onDesc') + '</p>';
    html += '<button class="mh-btn mh-btn-primary mh-btn-block" onclick="MH.openChangeAdminModal()">' + t('admin.changeBtn') + '</button>';
    html += '<button class="mh-btn mh-btn-danger mh-btn-block" style="margin-top:8px;" onclick="MH.logoutAdmin()">' + t('admin.logoutBtn') + '</button>';
    html += '<button class="mh-btn mh-btn-ghost mh-btn-block" style="margin-top:8px;" onclick="MH.closeModal()">' + t('admin.closeBtn') + '</button></div>';
  } else if(!S.pinExists){
    html += '<div class="mh-modal"><h3>' + t('admin.firstSetupTitle') + '</h3><p>' + t('admin.firstSetupDesc') + '</p>';
    html += '<div class="mh-field"><label>' + t('admin.newPinLabel') + '</label><input id="mh-new-pin" type="password" inputmode="numeric" placeholder="1234"></div>';
    html += '<button class="mh-btn mh-btn-primary mh-btn-block" onclick="MH.setupPin()">' + t('admin.setPinBtn') + '</button>';
    html += '<button class="mh-btn mh-btn-ghost mh-btn-block" style="margin-top:8px;" onclick="MH.closeModal()">' + t('admin.cancelBtn') + '</button></div>';
  } else {
    html += '<div class="mh-modal"><h3>' + t('admin.enterPinTitle') + '</h3><p>' + t('admin.enterPinDesc') + '</p>';
    html += '<div class="mh-field"><label>' + t('admin.pinLabel') + '</label><input id="mh-enter-pin" type="password" inputmode="numeric" placeholder="' + t('admin.pinPlaceholder') + '"></div>';
    html += '<button class="mh-btn mh-btn-primary mh-btn-block" onclick="MH.checkPin()">' + t('admin.enterBtn') + '</button>';
    html += '<button class="mh-btn mh-btn-ghost mh-btn-block" style="margin-top:8px;" onclick="MH.closeModal()">' + t('admin.cancelBtn') + '</button></div>';
  }
  overlay.innerHTML = html;
}
function closeModal(){
  var el = document.getElementById('mh-overlay');
  if(el) el.remove();
}

async function setupPin(){
  var val = document.getElementById('mh-new-pin').value.trim();
  if(val.length < 4){ showToast(t('onboard.pinTooShort')); return; }
  try {
    await window.storage.set(PIN_KEY, val, true);
    await window.storage.set(LOCAL_ADMIN_KEY, val, false);
    S.pinExists = true; S.isAdmin = true;
    closeModal(); render(); showToast(t('admin.onToast'));
  } catch(e){ showToast(t('admin.problemToast')); }
}

async function checkPin(){
  var val = document.getElementById('mh-enter-pin').value.trim();
  try {
    var res = await window.storage.get(PIN_KEY, true);
    var pin = res && res.value ? res.value : null;
    if(pin && pin === val){
      await window.storage.set(LOCAL_ADMIN_KEY, val, false);
      S.isAdmin = true; closeModal(); render(); showToast(t('admin.onToast'));
    } else {
      showToast(t('admin.wrongPin'));
    }
  } catch(e){ showToast(t('admin.problemToast')); }
}

async function logoutAdmin(){
  try { await window.storage.set(LOCAL_ADMIN_KEY, '', false); } catch(e){}
  S.isAdmin = false; closeModal(); render(); showToast(t('admin.offToast'));
}

/* Monthly manager handover: current admin picks the new manager from the
   member list and sets a brand-new pin. Every device (including this one,
   unless it re-enters the new pin) will drop back to view mode next sync. */
function openChangeAdminModal(){
  var act = activeMembers();
  if(act.length === 0){ showToast(t('admin.noActiveMembers')); return; }
  var overlay = ensureOverlay();
  var html = '<div class="mh-modal"><h3>' + t('admin.changeTitle') + '</h3>';
  html += '<p>' + t('admin.changeDesc') + '</p>';
  html += '<div class="mh-field"><label>' + t('admin.chooseManagerLabel') + '</label><select id="mh-change-manager-select">';
  act.forEach(function(m){
    html += '<option value="' + m.id + '"' + (m.id === S.data.managerId ? ' selected' : '') + '>' + escapeHtml(m.name) + '</option>';
  });
  html += '</select></div>';
  html += '<div class="mh-field"><label>' + t('admin.newPinLabel2') + '</label><input id="mh-change-pin" type="password" inputmode="numeric" placeholder="5678"></div>';
  html += '<button class="mh-btn mh-btn-primary mh-btn-block" onclick="MH.confirmChangeAdmin()">' + t('admin.setBtn') + '</button>';
  html += '<button class="mh-btn mh-btn-ghost mh-btn-block" style="margin-top:8px;" onclick="MH.openAdminModal()">' + t('admin.backBtn') + '</button></div>';
  overlay.innerHTML = html;
}

async function confirmChangeAdmin(){
  var val = document.getElementById('mh-change-pin').value.trim();
  var managerId = document.getElementById('mh-change-manager-select').value;
  if(!managerId){ showToast(t('admin.needManagerToast')); return; }
  if(val.length < 4){ showToast(t('onboard.pinTooShort')); return; }
  try {
    await window.storage.set(PIN_KEY, val, true);
    await window.storage.set(LOCAL_ADMIN_KEY, val, false);
    S.isAdmin = true;
    S.data.managerId = managerId;
    var mem = findMemberById(managerId);
    S.data.managerHistory.push({ name: mem ? mem.name : '', date: todayStr() });
    await saveData();
    closeModal(); render();
    showToast(t('admin.changedToast'));
  } catch(e){ showToast(t('admin.problemToast')); }
}

/* ---------------- ACTIONS ---------------- */
async function updateMeal(input){
  var date = input.getAttribute('data-date');
  var memberId = input.getAttribute('data-member');
  var val = input.value;
  if(!S.data.meals[date]) S.data.meals[date] = {};
  if(val === ''){ delete S.data.meals[date][memberId]; }
  else { S.data.meals[date][memberId] = parseFloat(val); }
  var ok = await saveData();
  if(ok) render();
}

async function addBazar(){
  var date = document.getElementById('mh-bazar-date').value || todayStr();
  var memberId = document.getElementById('mh-bazar-member').value;
  var item = document.getElementById('mh-bazar-item').value.trim();
  var amount = parseFloat(document.getElementById('mh-bazar-amount').value);
  if(!amount || amount <= 0){ showToast(t('toast.amountInvalid')); return; }
  S.data.bazar.push({ id: uid(), date: date, memberId: memberId, item: item, amount: amount });
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.bazarAdded')); }
}
async function deleteBazar(id){
  S.data.bazar = S.data.bazar.filter(function(b){ return b.id !== id; });
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.deleted')); }
}

async function addExpense(){
  var date = document.getElementById('mh-exp-date').value || todayStr();
  var category = document.getElementById('mh-exp-category').value;
  var note = document.getElementById('mh-exp-note').value.trim();
  var amount = parseFloat(document.getElementById('mh-exp-amount').value);
  if(!amount || amount <= 0){ showToast(t('toast.amountInvalid')); return; }
  S.data.expenses.push({ id: uid(), date: date, category: category, note: note, amount: amount });
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.expenseAdded')); }
}
async function deleteExpense(id){
  S.data.expenses = S.data.expenses.filter(function(x){ return x.id !== id; });
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.deleted')); }
}

async function addDeposit(){
  var memberId = document.getElementById('mh-dep-member').value;
  var date = document.getElementById('mh-dep-date').value || todayStr();
  var amount = parseFloat(document.getElementById('mh-dep-amount').value);
  var note = document.getElementById('mh-dep-note').value.trim();
  if(!amount || amount <= 0){ showToast(t('toast.amountInvalid')); return; }
  S.data.deposits.push({ id: uid(), memberId: memberId, date: date, amount: amount, note: note });
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.depositAdded')); }
}
async function deleteDeposit(id){
  S.data.deposits = S.data.deposits.filter(function(d){ return d.id !== id; });
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.deleted')); }
}

async function addMember(){
  var input = document.getElementById('mh-new-member');
  var name = input.value.trim();
  if(!name){ showToast(t('toast.nameRequired')); return; }
  var color = MEMBER_COLORS[S.data.members.length % MEMBER_COLORS.length];
  S.data.members.push({ id: uid(), name: name, color: color, active: true });
  var ok = await saveData();
  if(ok){ render(); showToast(name + t('toast.memberAddedSuffix')); }
}
async function archiveMember(id){
  var mem = findMemberById(id);
  var name = mem ? mem.name : '';
  if(!window.confirm(name + t('members.archiveConfirm'))) return;
  S.data.members.forEach(function(m){ if(m.id === id) m.active = false; });
  var ok = await saveData();
  if(ok){ render(); showToast(name + t('toast.memberArchivedSuffix')); }
}
async function reactivateMember(id){
  var mem = findMemberById(id);
  S.data.members.forEach(function(m){ if(m.id === id) m.active = true; });
  var ok = await saveData();
  if(ok){ render(); showToast((mem ? mem.name : '') + t('toast.memberReactivatedSuffix')); }
}
async function updateMessName(){
  var input = document.getElementById('mh-mess-name');
  var name = input.value.trim();
  if(!name){ showToast(t('toast.messNameRequired')); return; }
  S.data.messName = name;
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.messNameUpdated')); }
}

/* ---------------- THEME / LANGUAGE ---------------- */
async function setTheme(theme){
  S.theme = theme;
  try { await window.storage.set(THEME_KEY, theme, false); } catch(e){}
  render();
}
async function setLang(lang){
  S.lang = lang;
  try { await window.storage.set(LANG_KEY, lang, false); } catch(e){}
  render();
}

/* ---------------- PRINT REPORT ---------------- */
function buildPrintReport(){
  var c = calcMonth(S.ym);
  var mgr = findMemberById(S.data.managerId);
  var html = '<div class="mh-print-report">';
  html += '<h1>' + escapeHtml(S.data.messName || t('app.defaultName')) + '</h1>';
  html += '<div class="mh-print-meta">' + t('print.title') + ' &mdash; ' + ymLabel(S.ym) + '<br>';
  html += t('print.manager') + ': ' + escapeHtml(mgr ? mgr.name : t('manager.none')) + ' &middot; ' + t('print.generated') + ': ' + todayStr() + '</div>';

  html += '<table><thead><tr><th>' + t('print.memberCol') + '</th><th>' + t('print.mealsCol') + '</th><th>' + t('print.mealCostCol') + '</th><th>' + t('print.sharedCostCol') + '</th><th>' + t('print.totalCostCol') + '</th><th>' + t('print.depositCol') + '</th><th>' + t('print.balanceCol') + '</th></tr></thead><tbody>';
  c.members.forEach(function(m){
    var pm = c.perMember[m.id];
    html += '<tr><td>' + escapeHtml(m.name) + '</td><td>' + fmtInt(pm.meals) + '</td><td>' + fmtInt(pm.mealCost) + '</td><td>' + fmtInt(pm.otherShare) + '</td><td>' + fmtInt(pm.cost) + '</td><td>' + fmtInt(pm.deposit) + '</td><td>' + fmtInt(pm.balance) + '</td></tr>';
  });
  html += '<tr><td><b>' + t('print.totalsRow') + '</b></td><td><b>' + fmtInt(c.totalMeals) + '</b></td><td><b>' + fmtInt(c.totalCost) + '</b></td><td><b>' + fmtInt(c.totalOther) + '</b></td><td><b>' + fmtInt(c.totalCost + c.totalOther) + '</b></td><td><b>' + fmtInt(c.totalDeposit) + '</b></td><td><b>' + fmtInt(c.totalRemaining) + '</b></td></tr>';
  html += '</tbody></table>';

  var bazarEntries = S.data.bazar.filter(function(b){ return b.date.indexOf(S.ym) === 0; }).sort(function(a,b){ return a.date.localeCompare(b.date); });
  html += '<div class="mh-print-section-title">' + t('print.bazarSectionTitle') + '</div>';
  if(bazarEntries.length === 0){
    html += '<p>' + t('print.noEntries') + '</p>';
  } else {
    html += '<table><thead><tr><th>' + t('print.dateCol') + '</th><th>' + t('print.itemCol') + '</th><th>' + t('print.amountCol') + '</th></tr></thead><tbody>';
    bazarEntries.forEach(function(b){
      var mem = findMemberById(b.memberId);
      var detail = (b.item || '') + (mem ? (' - ' + mem.name) : '');
      html += '<tr><td>' + b.date + '</td><td>' + escapeHtml(detail) + '</td><td>' + fmtNum(b.amount) + '</td></tr>';
    });
    html += '</tbody></table>';
  }

  var expEntries = S.data.expenses.filter(function(x){ return x.date.indexOf(S.ym) === 0; }).sort(function(a,b){ return a.date.localeCompare(b.date); });
  html += '<div class="mh-print-section-title">' + t('print.expenseSectionTitle') + '</div>';
  if(expEntries.length === 0){
    html += '<p>' + t('print.noEntries') + '</p>';
  } else {
    html += '<table><thead><tr><th>' + t('print.dateCol') + '</th><th>' + t('print.itemCol') + '</th><th>' + t('print.amountCol') + '</th></tr></thead><tbody>';
    expEntries.forEach(function(x){
      var label = t('categories.' + x.category) + (x.note ? (' - ' + x.note) : '');
      html += '<tr><td>' + x.date + '</td><td>' + escapeHtml(label) + '</td><td>' + fmtNum(x.amount) + '</td></tr>';
    });
    html += '</tbody></table>';
  }

  html += '</div>';
  var container = document.getElementById('mh-print-report');
  if(container) container.innerHTML = html;
}
function printReport(){
  buildPrintReport();
  setTimeout(function(){ window.print(); }, 60);
}

/* ---------------- BACKUP / RESTORE ---------------- */
function downloadData(){
  try {
    var json = JSON.stringify(S.data, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'mess-hishab-backup-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
    showToast(t('toast.downloadStarted'));
  } catch(e){
    showToast(t('toast.downloadFailed'));
  }
}

async function copyData(){
  try {
    var json = JSON.stringify(S.data, null, 2);
    await navigator.clipboard.writeText(json);
    showToast(t('toast.copied'));
  } catch(e){
    showToast(t('toast.copyFailed'));
  }
}

function validateImportedData(obj){
  return obj && typeof obj === 'object' &&
    Array.isArray(obj.members) &&
    obj.meals && typeof obj.meals === 'object' &&
    Array.isArray(obj.bazar) &&
    Array.isArray(obj.deposits);
}

function handleUploadFile(input){
  var file = input.files && input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    confirmAndImport(e.target.result);
    input.value = '';
  };
  reader.onerror = function(){ showToast(t('toast.fileReadFailed')); };
  reader.readAsText(file);
}

function handleUploadPaste(){
  var text = document.getElementById('mh-upload-paste').value.trim();
  if(!text){ showToast(t('toast.pasteFirst')); return; }
  confirmAndImport(text);
}

function confirmAndImport(text){
  var parsed;
  try { parsed = JSON.parse(text); } catch(e){ showToast(t('toast.invalidJson')); return; }
  if(!validateImportedData(parsed)){ showToast(t('toast.invalidBackup')); return; }
  var overlay = document.createElement('div');
  overlay.className = 'mh-overlay';
  overlay.id = 'mh-import-overlay';
  var html = '<div class="mh-modal"><h3>' + t('importConfirm.title') + '</h3>';
  html += '<p>' + t('importConfirm.hasPrefix') + parsed.members.length + t('importConfirm.membersWord') + parsed.bazar.length + t('importConfirm.bazarWord') + parsed.deposits.length + t('importConfirm.depositsWord') + '<b>' + t('importConfirm.boldWarn') + '</b>' + t('importConfirm.afterBold') + '</p>';
  html += '<button class="mh-btn mh-btn-danger mh-btn-block" onclick="MH.applyImport()">' + t('importConfirm.confirmBtn') + '</button>';
  html += '<button class="mh-btn mh-btn-ghost mh-btn-block" style="margin-top:8px;" onclick="document.getElementById(\'mh-import-overlay\').remove()">' + t('importConfirm.cancelBtn') + '</button></div>';
  overlay.innerHTML = html;
  overlay.addEventListener('click', function(e){ if(e.target === overlay) overlay.remove(); });
  document.getElementById('mh-root').appendChild(overlay);
  S._pendingImport = parsed;
}

async function applyImport(){
  if(!S._pendingImport) return;
  S.data = S._pendingImport;
  normalizeData();
  S._pendingImport = null;
  var overlay = document.getElementById('mh-import-overlay');
  if(overlay) overlay.remove();
  var ok = await saveData();
  if(ok){ render(); showToast(t('toast.restored')); }
}

function setTab(tb){ S.tab = tb; render(); }
function shiftMonth(delta){
  var p = S.ym.split('-'); var y = parseInt(p[0],10), m = parseInt(p[1],10);
  m += delta;
  if(m < 1){ m = 12; y -= 1; } else if(m > 12){ m = 1; y += 1; }
  S.ym = y + '-' + pad2(m);
  render();
}

function attachGlobalHandlers(){
  document.querySelectorAll('.mh-meal-input').forEach(function(el){
    el.classList.add('mh-live-guard');
  });
}

/* ---------------- INIT ---------------- */
window.MH = {
  openAdminModal: openAdminModal, closeModal: closeModal, setupPin: setupPin, checkPin: checkPin, logoutAdmin: logoutAdmin,
  openChangeAdminModal: openChangeAdminModal, confirmChangeAdmin: confirmChangeAdmin,
  updateMeal: updateMeal, addBazar: addBazar, deleteBazar: deleteBazar, addExpense: addExpense, deleteExpense: deleteExpense,
  addDeposit: addDeposit, deleteDeposit: deleteDeposit,
  addMember: addMember, archiveMember: archiveMember, reactivateMember: reactivateMember, updateMessName: updateMessName,
  setTab: setTab, shiftMonth: shiftMonth, setTheme: setTheme, setLang: setLang, printReport: printReport,
  downloadData: downloadData, copyData: copyData, handleUploadFile: handleUploadFile, handleUploadPaste: handleUploadPaste,
  applyImport: applyImport,
  syncOnboardName: syncOnboardName, addOnboardMember: addOnboardMember, removeOnboardMember: removeOnboardMember, finishOnboarding: finishOnboarding
};

(async function init(){
  await loadAll();
  render();
  setInterval(pollForUpdates, 7000);
  setInterval(updateSyncLabel, 5000);
})();

})();
